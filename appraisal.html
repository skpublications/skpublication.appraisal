<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - SK Publication</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="card">
        <h2 id="welcome"></h2>

        <button onclick="logout()">Logout</button>

        <h3>Choose Employee to Rate</h3>

        <select id="employeeSelect"></select>

        <br><br>

        <button onclick="goToForm()">Rate Employee</button>
    </div>

    <div class="card" id="adminPanel" style="display:none;">
        <h3>CEO Panel - All Ratings</h3>
        <div id="ratingsList"></div>
    </div>

</div>

<script>
const user = localStorage.getItem("currentUser");

// Redirect if not logged in
if (!user) {
    window.location.href = "index.html";
}

document.getElementById("welcome").innerText = "Logged in as: " + user;

// Role permissions
const permissions = {
    "Shresth Chohan - Co-CEO": ["Yuvanshh Mishra"],
    "Yuvanshh Mishra - Comics Head": ["Siddharth Singh", "Dhruv Bhosale"],
    "Siddharth Singh - Comics Vice Head": ["Dhruv Bhosale", "Arnav Rege"],
    "Dhruv Bhosale - Comics Manager": ["Arnav Rege"],
    "Arnav Rege - Assistant Comic Head": ["Dhruv Bhosale"]
};

const select = document.getElementById("employeeSelect");

// Populate dropdown
if (permissions[user]) {
    permissions[user].forEach(emp => {
        const option = document.createElement("option");
        option.value = emp;
        option.textContent = emp;
        select.appendChild(option);
    });
} else {
    select.innerHTML = "<option>No employees assigned</option>";
}

function goToForm() {
    const emp = select.value;
    if (!emp) return;

    localStorage.setItem("selectedEmployee", emp);
    window.location.href = "form.html";
}

// Logout
function logout() {
    localStorage.removeItem("currentUser");
    localStorage.removeItem("selectedEmployee");
    window.location.href = "index.html";
}

// CEO Panel
if (user === "Kritansh Abhi - CEO") {
    document.getElementById("adminPanel").style.display = "block";

    const data = JSON.parse(localStorage.getItem("appraisals")) || [];
    const list = document.getElementById("ratingsList");

    if (data.length === 0) {
        list.innerHTML = "<p>No submissions yet</p>";
    } else {
        data.forEach(item => {
            const div = document.createElement("div");
            div.className = "card";

            div.innerHTML = `
                <b>Employee:</b> ${item.employee}<br>
                <b>Reviewer:</b> ${item.reviewer}<br>
                <b>Rating:</b> ⭐ ${item.rating}<br>
                <b>Comments:</b> ${item.comments}<br>
                <b>Date:</b> ${item.date}
            `;

            list.appendChild(div);
        });
    }
}
</script>

</body>
</html>

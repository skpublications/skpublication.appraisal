<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="card">
        <h2 id="welcome"></h2>

        <h3>Choose Employee to Rate</h3>

        <select id="employeeSelect">
            <option value="Shresth Chohan">Shresth Chohan</option>
            <option value="Yuvanshh Mishra">Yuvanshh Mishra</option>
            <option value="Siddharth Singh">Siddharth Singh</option>
            <option value="Dhruv Bhosale">Dhruv Bhosale</option>
            <option value="Arnav Rege">Arnav Rege</option>
        </select>

        <button onclick="goToForm()">Rate Employee</button>
    </div>

    <div class="card" id="adminPanel" style="display:none;">
        <h3>CEO Panel - All Ratings</h3>
        <div id="ratingsList"></div>
    </div>

</div>

<script>
const user = localStorage.getItem("currentUser");
document.getElementById("welcome").innerText = "Logged in as: " + user;

function goToForm() {
    const emp = document.getElementById("employeeSelect").value;
    localStorage.setItem("selectedEmployee", emp);
    window.location.href = "form.html";
}

// CEO panel
if (user === "Kritansh Abhi - CEO") {
    document.getElementById("adminPanel").style.display = "block";

    const data = JSON.parse(localStorage.getItem("appraisals")) || [];
    const list = document.getElementById("ratingsList");

    if (data.length === 0) {
        list.innerHTML = "<p>No submissions yet</p>";
    } else {
        data.forEach(item => {
            const div = document.createElement("div");
            div.className = "card";

            div.innerHTML = `
                <b>Employee:</b> ${item.employee}<br>
                <b>Reviewer:</b> ${item.reviewer}<br>
                <b>Rating:</b> ⭐ ${item.rating}<br>
                <b>Comments:</b> ${item.comments}<br>
                <b>Date:</b> ${item.date}
            `;

            list.appendChild(div);
        });
    }
}
</script>

</body>
</html>

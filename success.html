<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Success</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #eef2f7;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    background: white;
    padding: 40px;
    text-align: center;
    border-radius: 12px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

h1 {
    color: green;
}

button {
    margin-top: 20px;
    padding: 12px 20px;
    background: #1a2a44;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #2f4a75;
}
</style>
</head>

<body>

<div class="box">
    <h1>✅ Submitted Successfully</h1>
    <p>Your appraisal has been recorded.</p>

    <button onclick="goHome()">Go to Dashboard</button>
</div>

<script>
function goHome() {
    window.location.href = "appraisal.html";
}
</script>

</body>
</html>
